AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Serverless ETL Pipeline — S3, Lambda, Glue, Athena

Parameters:
  ProjectName:
    Type: String
    Default: etl-pipeline
  GlueScriptBucket:
    Type: String
    Default: ""
    Description: S3 bucket for Glue ETL script. Defaults to the raw bucket if empty.
  GlueScriptKey:
    Type: String
    Default: scripts/etl_transform.py

Conditions:
  UseDefaultScriptBucket: !Equals [!Ref GlueScriptBucket, ""]

Globals:
  Function:
    Runtime: python3.9
    Timeout: 60

Resources:

  # ── S3 Buckets ───────────────────────────────────────────────
  RawBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-raw-${AWS::AccountId}"

  ProcessedBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-processed-${AWS::AccountId}"

  # ── Lambda Function ──────────────────────────────────────────
  TriggerGlueFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-trigger-glue"
      Handler: trigger_glue.lambda_handler
      CodeUri: lambda/
      Environment:
        Variables:
          GLUE_JOB_NAME: !Sub "${ProjectName}-job"
          RAW_BUCKET: !Ref RawBucket
          PROCESSED_BUCKET: !Ref ProcessedBucket
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - glue:StartJobRun
              Resource: !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:job/${ProjectName}-job"
      Events:
        S3Upload:
          Type: S3
          Properties:
            Bucket: !Ref RawBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: incoming/

  # ── Glue IAM Role ───────────────────────────────────────────
  GlueJobRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-glue-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt RawBucket.Arn
                  - !Sub "${RawBucket.Arn}/*"
                  - !GetAtt ProcessedBucket.Arn
                  - !Sub "${ProcessedBucket.Arn}/*"
              - !If
                - UseDefaultScriptBucket
                - !Ref AWS::NoValue
                - Effect: Allow
                  Action:
                    - s3:GetObject
                    - s3:ListBucket
                  Resource:
                    - !Sub "arn:aws:s3:::${GlueScriptBucket}"
                    - !Sub "arn:aws:s3:::${GlueScriptBucket}/*"

  # ── Glue Job ─────────────────────────────────────────────────
  GlueETLJob:
    Type: AWS::Glue::Job
    Properties:
      Name: !Sub "${ProjectName}-job"
      Role: !GetAtt GlueJobRole.Arn
      GlueVersion: '4.0'
      WorkerType: G.1X
      NumberOfWorkers: 2
      Command:
        Name: glueetl
        ScriptLocation: !If
            - UseDefaultScriptBucket
            - !Sub "s3://${RawBucket}/${GlueScriptKey}"
            - !Sub "s3://${GlueScriptBucket}/${GlueScriptKey}"
        PythonVersion: '3'
      DefaultArguments:
        "--raw_bucket": !Ref RawBucket
        "--processed_bucket": !Ref ProcessedBucket
        "--catalog_database": !Ref GlueDatabase
        "--catalog_table": processed_data
        "--job-language": python
        "--job-bookmark-option": job-bookmark-enable
        "--enable-glue-datacatalog": "true"

  # ── Glue Database ────────────────────────────────────────────
  GlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: etl_pipeline_db

  # ── Glue Crawler ─────────────────────────────────────────────
  GlueCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: !Sub "${ProjectName}-crawler"
      Role: !GetAtt GlueJobRole.Arn
      DatabaseName: !Ref GlueDatabase
      Targets:
        S3Targets:
          - Path: !Sub "s3://${ProcessedBucket}/data/"

Outputs:
  RawBucketName:
    Value: !Ref RawBucket
  ProcessedBucketName:
    Value: !Ref ProcessedBucket
  LambdaFunctionArn:
    Value: !GetAtt TriggerGlueFunction.Arn
  GlueJobName:
    Value: !Ref GlueETLJob
